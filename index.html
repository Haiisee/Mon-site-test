<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accueil</title>
<style>
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
color: white;
}
.container { text-align: center; }
h1 { margin-bottom: 40px; }
button {
display: block;
margin: 15px auto;
padding: 15px 40px;
font-size: 18px;
border: none;
border-radius: 12px;
cursor: pointer;
background: #ffffff;
color: #333;
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
button:hover {
transform: scale(1.05);
background: #ffd369;
}
</style>
</head>
<body>
<div class="container">
<h1>Bienvenue</h1>
<button onclick="location.href='caron.html'">Je suis Caron</button>
<button onclick="location.href='alexis.html'">Je suis Alexis</button>
<button onclick="location.href='axel.html'">Je suis Axel</button>
<button onclick="location.href='lilian.html'">Je suis Lilian</button>
</div>
</body>
</html>
